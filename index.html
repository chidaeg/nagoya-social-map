<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>名古屋市 障がい福祉社会資源マップ</title>
    <meta
      name="description"
      content="名古屋市内の障がい福祉サービス事業所をカテゴリ別に検索・地図で確認できる非公式ガイドマップ"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__titles">
        <h1>名古屋市 障がい福祉社会資源マップ</h1>
        <p class="app-header__sub">
          名古屋市内の障がい福祉サービス事業所をカテゴリ別に検索・地図で確認できます
          <span class="badge">非公式 / 出典: ウェルネットなごや</span>
        </p>
      </div>
      <div class="app-header__right">
        <div id="auth-area" class="auth-area"></div>
        <button id="toggle-sidebar" class="toggle-sidebar" aria-label="一覧の開閉">
          ☰ 一覧
        </button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar" id="sidebar">
        <div class="search-panel" id="search-panel">
          <button
            type="button"
            class="search-panel__toggle"
            id="search-panel-toggle"
            aria-expanded="true"
            aria-controls="search-panel-body"
          >
            <span>🔍 絞り込み</span>
            <span class="search-panel__chevron" aria-hidden="true">▾</span>
          </button>

          <div class="search-panel__body" id="search-panel-body">
            <div class="search-box">
              <input
                type="search"
                id="search-input"
                placeholder="事業所名・住所で検索"
                autocomplete="off"
              />
            </div>

            <div class="filter-row">
              <label for="ward-select">区で絞り込み</label>
              <select id="ward-select">
                <option value="">すべての区</option>
              </select>
            </div>

            <div class="filter-section">
              <div class="filter-section__head">
                <span>カテゴリ</span>
                <div class="filter-section__actions">
                  <button id="check-all" type="button">全選択</button>
                  <button id="uncheck-all" type="button">全解除</button>
                </div>
              </div>
              <div id="category-filters" class="category-filters"></div>
            </div>
          </div>
        </div>

        <div class="result-summary">
          <span id="result-count">0</span> 件を表示中
        </div>

        <ul id="facility-list" class="facility-list"></ul>

        <footer class="sidebar-footer">
          <p>
            ※ 本サイトは
            <a href="https://fukuoka-social-map.pages.dev/" target="_blank" rel="noopener"
              >福岡市障がい福祉社会資源マップ</a
            >
            を参考にした非公式版です。データ出典: 名古屋市「ウェルネットなごや」障害福祉サービス事業所検索（座標は WAM NET ／ 国土地理院で補完）。正確な情報は各事業所・行政の公式情報をご確認ください。
          </p>
        </footer>
      </aside>

      <main class="map-wrap">
        <div id="map"></div>
      </main>
    </div>

    <!-- Googleログイン（Sign in with Google）-->
    <script src="https://accounts.google.com/gsi/client" async></script>
    <!-- マーカークラスタリング（Google Maps用） -->
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
    <script src="data/categories.js"></script>
    <script src="js/app.js"></script>
    <!-- Google Maps JavaScript API（callback=initMap でアプリ起動）-->
    <script
      async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAucI9__YQjowuweY9GEI_5mYHNyNLQyHc&callback=initMap&language=ja&region=JP"
    ></script>
  </body>
</html>
